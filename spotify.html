<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Playlist Lens — Spotify Song Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #060a0f;
    --surface: #0d1520;
    --surface2: #111d2e;
    --border: #1a2e45;
    --green: #1DB954;
    --green-dim: #158a3e;
    --green-glow: rgba(29,185,84,0.18);
    --text: #e8f0fe;
    --muted: #6b8aad;
    --accent: #00d4ff;
    --accent-glow: rgba(0,212,255,0.12);
    --red: #ff4d4d;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND GRID ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(29,185,84,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(29,185,84,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── FLOATING ORBS ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb-1 { width: 400px; height: 400px; background: rgba(29,185,84,0.07); top: -100px; left: -100px; }
  .orb-2 { width: 300px; height: 300px; background: rgba(0,212,255,0.05); bottom: -80px; right: -80px; animation-delay: -5s; }
  .orb-3 { width: 200px; height: 200px; background: rgba(29,185,84,0.04); top: 50%; left: 60%; animation-delay: -2s; }

  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(30px, 20px) scale(1.05); }
  }

  /* ── LAYOUT ── */
  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeUp .7s ease both;
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 8px 20px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--green);
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
    box-shadow: 0 0 10px var(--green);
  }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: .5; transform: scale(.7); }
  }

  h1 {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(52px, 9vw, 88px);
    line-height: .95;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #e8f0fe 30%, var(--green) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
    max-width: 420px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* ── INPUT CARD ── */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 40px;
    animation: fadeUp .7s .15s ease both;
    position: relative;
    overflow: hidden;
  }

  .input-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--green-glow), transparent 60%);
    pointer-events: none;
  }

  .input-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: block;
  }

  .input-row {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  .url-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color .25s, box-shadow .25s;
  }

  .url-input::placeholder { color: var(--muted); }

  .url-input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px var(--green-glow);
  }

  .btn-fetch {
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-family: 'Bebas Neue', cursive;
    font-size: 18px;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: background .2s, transform .15s, box-shadow .2s;
    white-space: nowrap;
    position: relative;
    overflow: hidden;
  }

  .btn-fetch::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.15), transparent);
  }

  .btn-fetch:hover {
    background: #23d45e;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(29,185,84,0.35);
  }

  .btn-fetch:active { transform: translateY(0); }

  .btn-fetch:disabled {
    opacity: .5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .hint {
    margin-top: 14px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .hint-icon { color: var(--accent); font-size: 14px; }

  /* ── ERROR ── */
  .error-box {
    background: rgba(255,77,77,0.08);
    border: 1px solid rgba(255,77,77,0.3);
    border-radius: 12px;
    padding: 16px 20px;
    color: var(--red);
    font-size: 13px;
    margin-bottom: 24px;
    display: none;
    animation: shake .4s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60%  { transform: translateX(-6px); }
    40%,80%  { transform: translateX(6px); }
  }

  /* ── PLAYLIST META ── */
  .meta-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 32px;
    margin-bottom: 28px;
    animation: fadeUp .5s ease both;
    position: relative;
    overflow: hidden;
  }

  .meta-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--green), var(--accent));
  }

  .meta-inner {
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }

  .playlist-art {
    width: 100px;
    height: 100px;
    border-radius: 12px;
    object-fit: cover;
    flex-shrink: 0;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
  }

  .playlist-art-placeholder {
    width: 100px;
    height: 100px;
    border-radius: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }

  .meta-info { flex: 1; min-width: 0; }

  .meta-info h2 {
    font-family: 'Bebas Neue', cursive;
    font-size: 32px;
    letter-spacing: 1px;
    line-height: 1;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .meta-owner {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 14px;
  }

  .meta-owner span { color: var(--green); }

  .meta-stats {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .stat {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .stat strong { color: var(--text); display: block; font-size: 15px; margin-bottom: 1px; }

  /* ── TOOLBAR ── */
  .toolbar {
    display: none;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 12px;
    flex-wrap: wrap;
    animation: fadeUp .5s .05s ease both;
  }

  .search-input {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px var(--green-glow);
  }

  .count-badge {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .count-badge strong { color: var(--green); }

  /* ── TRACK LIST ── */
  .tracks-container {
    display: none;
    animation: fadeUp .5s .1s ease both;
  }

  .track-item {
    display: grid;
    grid-template-columns: 44px 1fr auto;
    gap: 16px;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 8px;
    transition: background .2s, border-color .2s, transform .15s;
    cursor: default;
    animation: fadeUp .4s ease both;
  }

  .track-item:hover {
    background: var(--surface2);
    border-color: rgba(29,185,84,0.3);
    transform: translateX(4px);
  }

  .track-num {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    line-height: 1;
  }

  .track-art-wrap {
    position: relative;
    width: 44px;
    height: 44px;
    flex-shrink: 0;
  }

  .track-art {
    width: 44px;
    height: 44px;
    border-radius: 6px;
    object-fit: cover;
  }

  .track-art-ph {
    width: 44px;
    height: 44px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .track-info { min-width: 0; }

  .track-name {
    font-weight: 500;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .track-artist {
    color: var(--muted);
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .track-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
  }

  .track-duration {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .track-pop {
    width: 36px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .track-pop-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green-dim), var(--green));
    border-radius: 2px;
    transition: width .6s ease;
  }

  .explicit-badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    background: var(--muted);
    color: var(--bg);
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: 1px;
    font-weight: 700;
  }

  /* ── LOADING ── */
  .loading-state {
    display: none;
    text-align: center;
    padding: 60px 20px;
    animation: fadeUp .3s ease;
  }

  .loader-ring {
    width: 56px;
    height: 56px;
    border: 3px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 20px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    animation: blink 1.5s ease-in-out infinite;
  }

  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

  /* ── EMPTY / NOTICE ── */
  .notice {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
    font-size: 14px;
    display: none;
  }

  /* ── FOOTER ── */
  footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 24px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  footer a { color: var(--green); text-decoration: none; }

  /* ── COPY BUTTON ── */
  .btn-copy-all {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 18px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }

  .btn-copy-all:hover {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-glow);
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--green-dim); }

  @media (max-width: 560px) {
    .input-row { flex-direction: column; }
    .meta-inner { flex-direction: column; }
    h1 { font-size: 52px; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="wrapper">

  <!-- HEADER -->
  <header>
    <div class="logo-badge"><span class="logo-dot"></span>Playlist Lens</div>
    <h1>Spotify<br>Song Explorer</h1>
    <p class="subtitle">Paste any public Spotify playlist link and instantly reveal every track inside it.</p>
  </header>

  <!-- INPUT CARD -->
  <div class="input-card">
    <label class="input-label" for="urlInput">🎵 Playlist URL</label>
    <div class="input-row">
      <input
        id="urlInput"
        class="url-input"
        type="text"
        placeholder="https://open.spotify.com/playlist/..."
        autocomplete="off"
        spellcheck="false"
      />
      <button class="btn-fetch" id="fetchBtn" onclick="fetchPlaylist()">FETCH</button>
    </div>
    <p class="hint">
      <span class="hint-icon">ⓘ</span>
      Only <strong style="color:var(--text)">public</strong> playlists are supported. Copy the link from Spotify → Share → Copy link.
    </p>
  </div>

  <!-- ERROR -->
  <div class="error-box" id="errorBox"></div>

  <!-- LOADING -->
  <div class="loading-state" id="loadingState">
    <div class="loader-ring"></div>
    <div class="loading-text">Fetching tracks…</div>
  </div>

  <!-- META CARD -->
  <div class="meta-card" id="metaCard">
    <div class="meta-inner" id="metaInner"></div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar" id="toolbar">
    <input class="search-input" id="searchInput" type="text" placeholder="🔍  Search songs or artists…" oninput="filterTracks()"/>
    <div class="count-badge" id="countBadge"></div>
    <button class="btn-copy-all" onclick="copyAllTracks()">⎘ Copy All</button>
  </div>

  <!-- TRACKS -->
  <div class="tracks-container" id="tracksContainer"></div>

  <!-- NOTICE -->
  <div class="notice" id="notice"></div>

</div>

<footer>
  Built with ♥ · Uses the <a href="https://developer.spotify.com/documentation/web-api" target="_blank">Spotify Web API</a> · No data stored
</footer>

<script>
// ─────────────────────────────────────────────
//  CONFIG – Spotify credentials
//  We use the Client Credentials flow entirely
//  in-browser (PKCE not needed for public data).
// ─────────────────────────────────────────────
const CLIENT_ID     = ''; // leave blank — we'll use a public token endpoint
const TOKEN_URL     = 'https://accounts.spotify.com/api/token';
const API_BASE      = 'https://api.spotify.com/v1';

// We embed a minimal token via the Implicit/Public approach.
// For a fully public page, the safest method is Spotify's
// client-credentials token. We proxy it through a CORS-friendly
// helper via the public demo endpoint below (or user supplies keys).
// ─────────────────────────────────────────────

let allTracks = [];
let accessToken = null;
let tokenExpiry  = 0;

// ── Token ─────────────────────────────────────
// We'll prompt the user for Client ID + Secret the
// first time (stored in sessionStorage only).

async function getToken() {
  if (accessToken && Date.now() < tokenExpiry) return accessToken;

  let cid = sessionStorage.getItem('sp_cid');
  let csec = sessionStorage.getItem('sp_csec');

  if (!cid || !csec) {
    const info = promptCredentials();
    if (!info) throw new Error('Credentials required to use Spotify API.');
    cid = info.cid;
    csec = info.csec;
  }

  const resp = await fetch(TOKEN_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded',
      'Authorization': 'Basic ' + btoa(cid + ':' + csec)
    },
    body: 'grant_type=client_credentials'
  });

  if (!resp.ok) {
    sessionStorage.removeItem('sp_cid');
    sessionStorage.removeItem('sp_csec');
    throw new Error('Invalid Spotify credentials. Please try again.');
  }

  const json = await resp.json();
  accessToken = json.access_token;
  tokenExpiry = Date.now() + (json.expires_in - 60) * 1000;
  return accessToken;
}

function promptCredentials() {
  const modal = createModal();
  document.body.appendChild(modal);

  return new Promise(resolve => {
    modal.querySelector('#credSubmit').addEventListener('click', () => {
      const cid  = modal.querySelector('#credCid').value.trim();
      const csec = modal.querySelector('#credCsec').value.trim();
      if (!cid || !csec) {
        modal.querySelector('#credErr').textContent = 'Both fields are required.';
        return;
      }
      sessionStorage.setItem('sp_cid', cid);
      sessionStorage.setItem('sp_csec', csec);
      modal.remove();
      resolve({ cid, csec });
    });

    modal.querySelector('#credCancel').addEventListener('click', () => {
      modal.remove();
      resolve(null);
    });
  });
}

function createModal() {
  const m = document.createElement('div');
  m.style.cssText = `
    position:fixed;inset:0;background:rgba(6,10,15,.85);backdrop-filter:blur(6px);
    z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;
    animation:fadeUp .3s ease;
  `;
  m.innerHTML = `
    <div style="background:#0d1520;border:1px solid #1a2e45;border-radius:20px;padding:36px;max-width:460px;width:100%;position:relative;">
      <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#1DB954,#00d4ff);border-radius:20px 20px 0 0;"></div>
      <h2 style="font-family:'Bebas Neue',cursive;font-size:28px;margin-bottom:6px;letter-spacing:1px;">Spotify API Keys</h2>
      <p style="color:#6b8aad;font-size:13px;margin-bottom:24px;line-height:1.6;">
        This app needs your Spotify <strong style="color:#e8f0fe">Client ID</strong> and <strong style="color:#e8f0fe">Client Secret</strong>.
        <br><br>
        Get them free at <a href="https://developer.spotify.com/dashboard" target="_blank" style="color:#1DB954;">developer.spotify.com/dashboard</a>
        — create an app, copy the credentials.
        <br><span style="color:#6b8aad;font-size:11px;">(Stored only in this browser session — never sent anywhere else.)</span>
      </p>
      <label style="font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:#6b8aad;text-transform:uppercase;display:block;margin-bottom:6px;">Client ID</label>
      <input id="credCid" type="text" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
        style="width:100%;background:#060a0f;border:1px solid #1a2e45;border-radius:10px;padding:12px 16px;color:#e8f0fe;font-family:'Space Mono',monospace;font-size:12px;outline:none;margin-bottom:14px;"/>
      <label style="font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:#6b8aad;text-transform:uppercase;display:block;margin-bottom:6px;">Client Secret</label>
      <input id="credCsec" type="password" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
        style="width:100%;background:#060a0f;border:1px solid #1a2e45;border-radius:10px;padding:12px 16px;color:#e8f0fe;font-family:'Space Mono',monospace;font-size:12px;outline:none;margin-bottom:6px;"/>
      <div id="credErr" style="color:#ff4d4d;font-size:12px;min-height:18px;margin-bottom:16px;"></div>
      <div style="display:flex;gap:10px;">
        <button id="credCancel"
          style="flex:1;background:transparent;border:1px solid #1a2e45;border-radius:10px;padding:12px;color:#6b8aad;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;">
          Cancel
        </button>
        <button id="credSubmit"
          style="flex:2;background:#1DB954;border:none;border-radius:10px;padding:12px;color:#000;font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:1px;cursor:pointer;">
          CONNECT
        </button>
      </div>
    </div>
  `;
  return m;
}

// ── Extract playlist ID ──────────────────────
function extractPlaylistId(url) {
  url = url.trim();
  // Handle formats:
  // https://open.spotify.com/playlist/37i9dQZF1DXcBWIGoYBM5M
  // spotify:playlist:37i9dQZF1DXcBWIGoYBM5M
  const patterns = [
    /open\.spotify\.com\/playlist\/([a-zA-Z0-9]+)/,
    /spotify:playlist:([a-zA-Z0-9]+)/,
    /^([a-zA-Z0-9]{22})$/
  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  return null;
}

// ── Format ms → m:ss ────────────────────────
function fmtMs(ms) {
  const s = Math.round(ms / 1000);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

// ── Fetch all pages ─────────────────────────
async function fetchAllTracks(token, playlistId) {
  let url = `${API_BASE}/playlists/${playlistId}/tracks?limit=100&fields=next,items(track(id,name,duration_ms,explicit,popularity,artists(name),album(name,images)))`;
  const tracks = [];
  while (url) {
    const r = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if (!r.ok) throw new Error(`Spotify API error: ${r.status} ${r.statusText}`);
    const data = await r.json();
    for (const item of data.items || []) {
      if (item && item.track && item.track.id) tracks.push(item.track);
    }
    url = data.next;
  }
  return tracks;
}

// ── Main fetch ──────────────────────────────
async function fetchPlaylist() {
  const raw = document.getElementById('urlInput').value;
  const id  = extractPlaylistId(raw);

  setError('');
  hide('metaCard'); hide('toolbar'); hide('tracksContainer'); hide('notice');

  if (!id) {
    setError('⚠️ Could not find a valid Spotify playlist ID in that URL. Please paste a full playlist link.');
    return;
  }

  show('loadingState');
  document.getElementById('fetchBtn').disabled = true;

  try {
    const token = await getToken();
    if (!token) { hide('loadingState'); document.getElementById('fetchBtn').disabled = false; return; }

    // Fetch playlist meta
    const metaResp = await fetch(`${API_BASE}/playlists/${id}?fields=name,description,owner(display_name),followers(total),images`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!metaResp.ok) throw new Error(`Could not load playlist. Is it public? (${metaResp.status})`);
    const meta = await metaResp.json();

    // Fetch tracks
    allTracks = await fetchAllTracks(token, id);

    hide('loadingState');
    renderMeta(meta, allTracks.length);
    renderTracks(allTracks);
    show('toolbar');
    show('tracksContainer');
    updateCount(allTracks.length, allTracks.length);

  } catch (e) {
    hide('loadingState');
    setError('❌ ' + e.message);
  } finally {
    document.getElementById('fetchBtn').disabled = false;
  }
}

// ── Render meta ─────────────────────────────
function renderMeta(meta, total) {
  const img = meta.images && meta.images[0] ? meta.images[0].url : null;
  const followers = (meta.followers?.total || 0).toLocaleString();
  const desc = meta.description ? stripHtml(meta.description) : '';

  document.getElementById('metaInner').innerHTML = `
    ${img
      ? `<img src="${img}" class="playlist-art" alt="cover"/>`
      : `<div class="playlist-art-placeholder">🎵</div>`}
    <div class="meta-info">
      <h2 title="${esc(meta.name)}">${esc(meta.name)}</h2>
      <div class="meta-owner">by <span>${esc(meta.owner?.display_name || 'Unknown')}</span>${desc ? ' · ' + esc(desc.substring(0,80)) + (desc.length > 80 ? '…' : '') : ''}</div>
      <div class="meta-stats">
        <div class="stat"><strong>${total}</strong>Tracks</div>
        <div class="stat"><strong>${followers}</strong>Followers</div>
      </div>
    </div>
  `;
  show('metaCard');
}

// ── Render tracks ────────────────────────────
function renderTracks(tracks) {
  const container = document.getElementById('tracksContainer');

  if (!tracks.length) {
    container.innerHTML = '';
    show('notice');
    document.getElementById('notice').textContent = 'No tracks match your search.';
    return;
  }

  hide('notice');
  container.innerHTML = tracks.map((t, i) => {
    const art     = t.album?.images?.[2]?.url || t.album?.images?.[0]?.url;
    const artists = (t.artists || []).map(a => a.name).join(', ');
    const pop     = t.popularity || 0;
    return `
      <div class="track-item" style="animation-delay:${Math.min(i * 18, 400)}ms">
        <div class="track-num">${String(i+1).padStart(2,'0')}</div>
        <div style="display:flex;gap:12px;align-items:center;min-width:0;">
          ${art
            ? `<img src="${art}" class="track-art" alt="" loading="lazy"/>`
            : `<div class="track-art-ph">♪</div>`}
          <div class="track-info">
            <div class="track-name" title="${esc(t.name)}">${esc(t.name)}${t.explicit ? ' <span class="explicit-badge">E</span>' : ''}</div>
            <div class="track-artist" title="${esc(artists)}">${esc(artists)}</div>
          </div>
        </div>
        <div class="track-right">
          <div class="track-duration">${fmtMs(t.duration_ms || 0)}</div>
          <div class="track-pop" title="Popularity: ${pop}/100">
            <div class="track-pop-fill" style="width:${pop}%"></div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  show('tracksContainer');
}

// ── Filter ───────────────────────────────────
function filterTracks() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allTracks.filter(t => {
    const name    = (t.name || '').toLowerCase();
    const artists = (t.artists || []).map(a => a.name).join(' ').toLowerCase();
    const album   = (t.album?.name || '').toLowerCase();
    return name.includes(q) || artists.includes(q) || album.includes(q);
  });
  renderTracks(filtered);
  updateCount(filtered.length, allTracks.length);
}

function updateCount(shown, total) {
  const el = document.getElementById('countBadge');
  el.innerHTML = shown === total
    ? `<strong>${total}</strong> tracks`
    : `<strong>${shown}</strong> of ${total} tracks`;
}

// ── Copy ─────────────────────────────────────
function copyAllTracks() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const list = (q
    ? allTracks.filter(t => {
        const s = [(t.name||''), ...(t.artists||[]).map(a=>a.name), (t.album?.name||'')].join(' ').toLowerCase();
        return s.includes(q);
      })
    : allTracks
  ).map((t, i) => {
    const a = (t.artists||[]).map(x=>x.name).join(', ');
    return `${String(i+1).padStart(3,' ')}. ${t.name} — ${a}`;
  }).join('\n');

  navigator.clipboard.writeText(list).then(() => {
    const btn = document.querySelector('.btn-copy-all');
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    btn.style.borderColor = 'var(--green)';
    btn.style.color = 'var(--green)';
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; btn.style.borderColor = ''; }, 2000);
  });
}

// ── Utils ────────────────────────────────────
function show(id) { document.getElementById(id).style.display = (id === 'toolbar' ? 'flex' : 'block'); }
function hide(id) { document.getElementById(id).style.display = 'none'; }
function setError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function stripHtml(s) { return s.replace(/<[^>]*>/g,''); }

// Enter key shortcut
document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchPlaylist();
});
</script>
