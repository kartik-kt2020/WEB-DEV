<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
  margin: 0;
  height: 50vh;
  background: linear-gradient(135deg, green, blue);
  display: flex;
  flex-direction: column;   /* Important */
  justify-content: space-between;  /* Pushes top & bottom */
  align-items: center;
  font-family: Arial, sans-serif;
  color: white;
}


        .clock-container {
            text-align: center;
            background: rgba(205, 15, 15, 0.4);
            padding: 30px 50px;
            border-radius: 10px;
        }

        #time {
            font-size: 50px;
            margin: 0;
        }

        #date {
            font-size: 20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <H1>THIS CLOCK IS MADE USING JAVASCRIPT</H1>
    <div class="clock-container">
        <h1 id="time">00:00:00 AM</h1>
        <p id="date">Loading date...</p>
    </div>

    <script>
        function updateClock() {
            const now = new Date();

            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();

            let period = hours >= 12 ? "PM" : "AM";

            hours = hours % 12;
            hours = hours ? hours : 12;

            hours = hours < 10 ? "0" + hours : hours;
            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;

            const timeString = `${hours}:${minutes}:${seconds} ${period}`;
            document.getElementById("time").textContent = timeString;

            const options = { weekday: "long", year: "numeric", month: "long", day: "numeric" };
            const dateString = now.toLocaleDateString(undefined, options);

            document.getElementById("date").textContent = dateString;
        }

        updateClock();
        setInterval(updateClock, 1000);
    </script>
    <br>
    <marquee direction="right" scrollamount="10" behavior="alternate">
  Kartik is learning Web Dev 🚀
</marquee>
</body>
</html>
